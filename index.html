<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f4f5f8; color: #1a1a2e; padding: 24px;
}
.card {
  width: 100%; max-width: 600px; background: #fff;
  border-radius: 14px; padding: 36px 32px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
}
h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
.sub { font-size: 13px; color: #888; margin-bottom: 24px; }
.drop {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 2px dashed #c5c9d6; border-radius: 12px; padding: 44px 20px;
  cursor: pointer; transition: all .2s; margin-bottom: 20px;
}
.drop.over { border-color: #7c5cbf; background: rgba(124,92,191,.05); }
.drop svg { margin-bottom: 10px; }
.drop .name { font-size: 14px; font-weight: 500; }
.drop .size { font-size: 12px; color: #999; margin-top: 4px; }
.drop input { display: none; }
.status { font-size: 13px; color: #7c5cbf; margin-bottom: 16px; min-height: 18px; }
.actions { display: flex; flex-direction: column; gap: 14px; }
.row { display: flex; align-items: center; gap: 10px; font-size: 13px; flex-wrap: wrap; }
.row label { min-width: 90px; font-weight: 500; }
select {
  padding: 8px 12px; border-radius: 6px; border: 1px solid #d1d5db;
  font-size: 13px; background: #fff; flex: 1;
}
input[type=range] { flex: 1; accent-color: #7c5cbf; }
.quality-val { min-width: 40px; text-align: center; font-weight: 600; font-size: 13px; }
.btn-primary {
  padding: 12px 0; border-radius: 8px; border: none;
  background: #7c5cbf; color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .2s; margin-top: 4px;
}
.btn-primary:hover { background: #6a4daa; }
.btn-primary:disabled { background: #a0aec0; cursor: default; }
.progress { width: 100%; height: 6px; background: #e2e5ea; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
.progress-bar { height: 100%; background: #7c5cbf; border-radius: 3px; transition: width .2s; width: 0; }
.hidden { display: none; }

/* File list */
.file-list { margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
.file-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  background: #f8f9fb; border-radius: 8px; margin-bottom: 4px; font-size: 13px;
}
.file-item .fi-thumb {
  width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #eee;
}
.file-item .fi-name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-item .fi-size { color: #888; font-size: 12px; white-space: nowrap; }
.file-item .fi-remove {
  background: none; border: none; color: #c53030; cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px;
}
.file-item .fi-remove:hover { background: #fff0f0; }

.result {
  margin-top: 16px; padding: 16px; background: #f0faf0; border-radius: 10px;
  font-size: 13px; display: flex; flex-direction: column; gap: 10px;
}
.result .stats { display: flex; gap: 20px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; }
.stat-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-size: 16px; font-weight: 700; }
.btn-download {
  padding: 10px 20px; border-radius: 8px; border: none;
  background: #38a169; color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; align-self: flex-start;
}
.btn-download:hover { background: #2f855a; }
.info-box {
  padding: 10px 14px; background: #f5f0ff; border-radius: 8px;
  font-size: 12px; color: #6b46a0; line-height: 1.5; border: 1px solid #e2d6f5;
}
</style>
</head>
<body>
<div class="card">
  <h1>Image Converter</h1>
  <p class="sub">Konwersja grafik w przeglądarce — pliki nie opuszczają Twojego komputera.</p>

  <label class="drop" id="dropZone">
    <input type="file" accept="image/*" id="fileInput" multiple>
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8b90a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <span class="name" id="dropLabel">Upuść grafiki lub kliknij (można wiele naraz)</span>
  </label>

  <div class="file-list hidden" id="fileList"></div>

  <div class="progress hidden" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="status" id="status"></p>

  <div class="actions hidden" id="actions">
    <div class="row">
      <label>Format docelowy:</label>
      <select id="formatSelect"></select>
    </div>
    <div class="row" id="qualityRow">
      <label>Jakość:</label>
      <input type="range" id="qualityRange" min="5" max="100" value="85" step="5">
      <span class="quality-val" id="qualityVal">85%</span>
    </div>
    <div id="qualityInfo" class="info-box">
      Jakość dotyczy JPG i WebP. Dla PNG, BMP, GIF i ICO jakość nie ma wpływu — te formaty są bezstratne.
    </div>
    <button class="btn-primary" id="btnConvert">Konwertuj</button>
  </div>

  <div class="result hidden" id="result">
    <div class="stats">
      <div class="stat">
        <span class="stat-label">Pliki</span>
        <span class="stat-value" id="resCount">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Przed</span>
        <span class="stat-value" id="resBefore">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Po</span>
        <span class="stat-value" id="resAfter">—</span>
      </div>
    </div>
    <button class="btn-download" id="btnDownload">Pobierz</button>
    <button class="btn-download" id="btnPreview" style="background:#7c5cbf;margin-left:8px;">Podgląd w przeglądarce</button>
  </div>
</div>

<script>
const $ = s => document.getElementById(s);
let files = [];
let outputBlob = null;
let outputFileName = '';

const LOSSY_FORMATS = ['jpg', 'webp'];

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(0) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}

function setProgress(p) { $('progressWrap').classList.remove('hidden'); $('progressBar').style.width = Math.min(100,p)+'%'; }
function hideProgress() { $('progressWrap').classList.add('hidden'); $('progressBar').style.width = '0'; }

// --- Drag & drop ---
const dropZone = $('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  addFiles(e.dataTransfer.files);
});
$('fileInput').addEventListener('change', () => addFiles($('fileInput').files));

function addFiles(newFiles) {
  for (const f of newFiles) {
    if (f.type.startsWith('image/') && !files.some(x => x.name === f.name && x.size === f.size)) {
      files.push(f);
    }
  }
  if (files.length === 0) { $('status').textContent = 'Wybierz pliki graficzne.'; return; }
  renderFileList();
  $('actions').classList.remove('hidden');
  $('result').classList.add('hidden');
  $('status').textContent = '';
}

function renderFileList() {
  const el = $('fileList');
  el.innerHTML = '';
  files.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';

    const thumb = document.createElement('img');
    thumb.className = 'fi-thumb';
    thumb.src = URL.createObjectURL(f);

    const name = document.createElement('span');
    name.className = 'fi-name';
    name.textContent = f.name;

    const size = document.createElement('span');
    size.className = 'fi-size';
    size.textContent = fmtSize(f.size);

    const btn = document.createElement('button');
    btn.className = 'fi-remove';
    btn.textContent = '✕';
    btn.onclick = (e) => {
      e.preventDefault(); e.stopPropagation();
      files.splice(i, 1);
      renderFileList();
      if (files.length === 0) { $('actions').classList.add('hidden'); }
    };

    div.append(thumb, name, size, btn);
    el.appendChild(div);
  });
  el.classList.remove('hidden');
  $('dropLabel').textContent = files.length + ' plik(ów) — kliknij żeby dodać więcej';
}

// --- Detect supported formats ---
function detectFormats() {
  const canvas = document.createElement('canvas');
  canvas.width = 1; canvas.height = 1;
  const formats = [
    { value: 'jpg', label: 'JPG', mime: 'image/jpeg' },
    { value: 'png', label: 'PNG', mime: 'image/png' },
    { value: 'webp', label: 'WebP', mime: 'image/webp' },
    { value: 'bmp', label: 'BMP', mime: 'image/bmp' },
    { value: 'gif', label: 'GIF', mime: 'image/gif' },
    { value: 'ico', label: 'ICO', mime: 'image/x-icon' },
  ];
  const sel = $('formatSelect');
  sel.innerHTML = '';
  for (const fmt of formats) {
    const dataURL = canvas.toDataURL(fmt.mime);
    const actualMime = dataURL.split(',')[0].match(/:(.*?);/)[1];
    const supported = actualMime === fmt.mime || (fmt.value === 'ico' && actualMime === 'image/png');
    const opt = document.createElement('option');
    opt.value = fmt.value;
    if (!supported && fmt.value !== 'ico') {
      opt.textContent = fmt.label + ' (niedostępny w tej przeglądarce)';
      opt.disabled = true;
    } else {
      opt.textContent = fmt.label;
    }
    sel.appendChild(opt);
  }
  // Select first enabled
  for (const opt of sel.options) {
    if (!opt.disabled) { sel.value = opt.value; break; }
  }
  updateQualityVisibility();
}
detectFormats();

$('formatSelect').addEventListener('change', updateQualityVisibility);
$('qualityRange').addEventListener('input', () => {
  $('qualityVal').textContent = $('qualityRange').value + '%';
});

function updateQualityVisibility() {
  const fmt = $('formatSelect').value;
  const isLossy = LOSSY_FORMATS.includes(fmt);
  $('qualityRow').style.opacity = isLossy ? '1' : '0.4';
  $('qualityRange').disabled = !isLossy;
  $('qualityInfo').classList.toggle('hidden', isLossy);
}
updateQualityVisibility();

// --- Convert ---
function getMimeType(fmt) {
  switch (fmt) {
    case 'jpg': return 'image/jpeg';
    case 'png': return 'image/png';
    case 'webp': return 'image/webp';
    case 'bmp': return 'image/bmp';
    case 'gif': return 'image/gif';
    case 'ico': return 'image/png'; // we'll handle ico specially
    default: return 'image/png';
  }
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Nie można załadować: ' + file.name));
    img.src = URL.createObjectURL(file);
  });
}

function canvasToBlob(canvas, mimeType, quality) {
  return new Promise((resolve, reject) => {
    const dataURL = canvas.toDataURL(mimeType, quality);
    const parts = dataURL.split(',');
    const actualMime = parts[0].match(/:(.*?);/)[1];
    const binary = atob(parts[1]);
    let array = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);

    // Fix JPEG: ensure proper JFIF header with 96 DPI
    // Windows Photos rejects JPEGs with density 1x1 / aspect ratio
    if (actualMime === 'image/jpeg') {
      array = fixJpegDPI(array, 96);
    }

    resolve({ blob: new Blob([array], { type: actualMime }), actualMime });
  });
}

// Patch JFIF header to set proper DPI (pixels per inch)
function fixJpegDPI(data, dpi) {
  // JPEG starts with FF D8, then segments
  // JFIF APP0 segment: FF E0 [length] "JFIF\0" [version] [units] [Xdensity] [Ydensity]
  if (data[0] !== 0xFF || data[1] !== 0xD8) return data; // not JPEG

  // Find APP0 JFIF segment
  if (data[2] === 0xFF && data[3] === 0xE0) {
    const len = (data[4] << 8) | data[5];
    // Check "JFIF\0" signature at offset 6
    if (data[6] === 0x4A && data[7] === 0x46 && data[8] === 0x49 && data[9] === 0x46 && data[10] === 0x00) {
      // Offset 13: units (0=aspect, 1=dots/inch, 2=dots/cm)
      // Offset 14-15: X density (big-endian)
      // Offset 16-17: Y density (big-endian)
      const patched = new Uint8Array(data);
      patched[13] = 1; // units = dots per inch
      patched[14] = (dpi >> 8) & 0xFF;
      patched[15] = dpi & 0xFF;
      patched[16] = (dpi >> 8) & 0xFF;
      patched[17] = dpi & 0xFF;
      return patched;
    }
  }

  // No JFIF APP0 found — insert one after SOI
  // Build a minimal JFIF APP0 segment
  const jfif = new Uint8Array([
    0xFF, 0xE0,       // APP0 marker
    0x00, 0x10,       // length = 16
    0x4A, 0x46, 0x49, 0x46, 0x00, // "JFIF\0"
    0x01, 0x01,       // version 1.1
    0x01,             // units = dots per inch
    (dpi >> 8) & 0xFF, dpi & 0xFF, // X density
    (dpi >> 8) & 0xFF, dpi & 0xFF, // Y density
    0x00, 0x00        // no thumbnail
  ]);

  const result = new Uint8Array(2 + jfif.length + data.length - 2);
  result[0] = 0xFF;
  result[1] = 0xD8;
  result.set(jfif, 2);
  result.set(data.subarray(2), 2 + jfif.length);
  return result;
}

async function convertFile(file, format, quality) {
  const img = await loadImage(file);
  let w = img.naturalWidth;
  let h = img.naturalHeight;

  // ICO: scale down to 256x256 max
  if (format === 'ico') {
    const maxIco = 256;
    if (w > maxIco || h > maxIco) {
      const scale = Math.min(maxIco / w, maxIco / h);
      w = Math.round(w * scale);
      h = Math.round(h * scale);
    }
  }

  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  // JPG/BMP don't support transparency — fill white background
  if (format === 'jpg' || format === 'bmp') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, w, h);
  }

  ctx.drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(img.src);

  const mimeType = getMimeType(format);
  const q = LOSSY_FORMATS.includes(format) ? quality / 100 : undefined;

  const { blob, actualMime } = await canvasToBlob(canvas, mimeType, q);

  // Check if browser actually produced the requested format
  // If not (e.g. BMP/GIF not supported), it falls back to PNG
  if (actualMime !== mimeType && format !== 'ico') {
    // Browser doesn't support this format natively
    // Return the PNG blob but flag the actual extension
    blob._actualFormat = 'png';
  }

  if (!blob) throw new Error('Konwersja nie powiodła się dla: ' + file.name);

  return blob;
}

$('btnConvert').addEventListener('click', async () => {
  if (files.length === 0) return;
  const btn = $('btnConvert');
  btn.disabled = true;
  $('result').classList.add('hidden');
  $('status').textContent = 'Konwertowanie...';
  setProgress(0);

  const format = $('formatSelect').value;
  const quality = parseInt($('qualityRange').value);
  const ext = format === 'jpg' ? 'jpg' : format;

  try {
    let totalOrigSize = 0;
    let totalNewSize = 0;

    if (files.length === 1) {
      // Single file — direct download
      const f = files[0];
      totalOrigSize = f.size;
      $('status').textContent = 'Konwertowanie: ' + f.name;
      setProgress(50);

      const blob = await convertFile(f, format, quality);
      totalNewSize = blob.size;

      const baseName = f.name.replace(/\.[^.]+$/, '');
      const actualExt = blob._actualFormat || ext;
      outputFileName = baseName + '.' + actualExt;
      outputBlob = blob;

      if (blob._actualFormat) {
        $('status').textContent = 'Uwaga: przeglądarka nie obsługuje formatu ' + format.toUpperCase() + '. Plik zapisano jako ' + actualExt.toUpperCase() + '.';
      }
    } else {
      // Multiple files — ZIP
      const zip = new JSZip();

      for (let i = 0; i < files.length; i++) {
        const f = files[i];
        totalOrigSize += f.size;
        $('status').textContent = 'Konwertowanie ' + (i + 1) + ' z ' + files.length + ': ' + f.name;
        setProgress(Math.round(((i + 0.5) / files.length) * 90));

        const blob = await convertFile(f, format, quality);
        totalNewSize += blob.size;

        const baseName = f.name.replace(/\.[^.]+$/, '');
        const actualExt = blob._actualFormat || ext;
        zip.file(baseName + '.' + actualExt, blob);
      }

      $('status').textContent = 'Pakowanie ZIP...';
      setProgress(95);
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      outputBlob = zipBlob;
      outputFileName = 'converted_' + format + '.zip';
      totalNewSize = zipBlob.size;
    }

    $('resCount').textContent = files.length;
    $('resBefore').textContent = fmtSize(totalOrigSize);
    $('resAfter').textContent = fmtSize(totalNewSize);

    $('result').classList.remove('hidden');
    setProgress(100);
    $('status').textContent = 'Gotowe!';
  } catch (e) {
    $('status').textContent = 'Błąd: ' + e.message;
    console.error(e);
  }
  btn.disabled = false;
  setTimeout(hideProgress, 1500);
});

// --- Download ---
$('btnDownload').addEventListener('click', () => {
  if (!outputBlob) return;
  const url = URL.createObjectURL(outputBlob);
  const a = document.createElement('a');
  a.href = url; a.download = outputFileName; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
});

$('btnPreview').addEventListener('click', () => {
  if (!outputBlob) return;
  const url = URL.createObjectURL(outputBlob);
  window.open(url, '_blank');
});
</script>
</body>
</html>
