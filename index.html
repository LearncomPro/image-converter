<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Remover</title>
  <script type="module" crossorigin src="./assets/index-C_XQZX1R.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DOtjlr6C.css">
</head>
<body>
<div class="card">
  <h1>Background Remover</h1>
  <p class="sub">Usuń tło z grafiki — automatycznie, w przeglądarce.</p>

  <label class="drop" id="dropZone">
    <input type="file" accept="image/*" id="fileInput">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8b90a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <span class="name" id="dropLabel">Upuść grafikę lub kliknij</span>
    <span class="size hidden" id="fileSize"></span>
  </label>

  <div class="progress hidden" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <p class="status" id="status"></p>

  <div class="preview-area hidden" id="previewArea">
    <div class="preview-box">
      <div class="label">Oryginał</div>
      <img id="originalImg">
    </div>
    <div class="preview-box">
      <div class="label">Bez tła</div>
      <div class="result-wrap checkerboard">
        <img id="resultImg">
      </div>
    </div>
  </div>

  <div class="actions hidden" id="actions">
    <button class="btn-download" id="btnDownload">Pobierz PNG</button>
    <button class="btn-new" id="btnNew">Nowa grafika</button>
  </div>
</div>

</body>
</html>
